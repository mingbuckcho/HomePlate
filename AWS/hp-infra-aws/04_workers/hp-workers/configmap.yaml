apiVersion: v1
kind: ConfigMap
metadata:
  name: hp-config
  namespace: hp-workers
data:
  MONGO_HOST: "mongodb.mongodb.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "hp_ops"
  MONGO_REPLICA_SET: ""

  MYSQL_HOST: "hp-rds-master.chemcscc2ik6.ap-northeast-2.rds.amazonaws.com"
  MYSQL_PORT: "3306"
  MYSQL_DB: "homeplate"

  AWS_REGION: "ap-northeast-2"
  S3_BUCKET: "hp-thumbnails"

  LOCK_EXPIRE_MINUTES: "30"

  NAVER_NEWS_API_URL: "https://api-gw.sports.naver.com/news/articles/kbaseball"
  KBOMARKET_ROOT_URL: "https://kbomarket.com"
  KBO_SCHEDULE_API_URL: "https://www.koreabaseball.com/ws/Schedule.asmx/GetScheduleList"
  KBO_SCHEDULE_SEASON: "2026"

  # Strimzi가 Kafka 클러스터를 생성하면 자동으로 이 형식의 Service가 만들어진다.
  # 형식: {클러스터명}-kafka-bootstrap.{네임스페이스}.svc.cluster.local
  # TLS listener: 9093
  KAFKA_BOOTSTRAP_SERVERS: "ticketing-kafka-bootstrap.kafka.svc.cluster.local:9093"
  KAFKA_TOPIC_CRAWL_RESULT: "hp.crawl.result"
  KAFKA_TOPIC_CRAWL_EXPORTED: "hp.crawl.exported"
  KAFKA_SECURITY_PROTOCOL: "SSL"
  # Strimzi 클러스터 CA (브로커 TLS 인증서 검증용) — volume: cluster-ca
  KAFKA_SSL_CA_LOCATION: "/etc/kafka/cluster-ca/ca.crt"
  # KafkaUser 클라이언트 인증서/키 — volume: user-tls
  KAFKA_SSL_CERT_LOCATION: "/etc/kafka/user-tls/user.crt"
  KAFKA_SSL_KEY_LOCATION: "/etc/kafka/user-tls/user.key"
---
# Exporter는 MongoDB 접속 계정이 svc-exporter로 다르므로 별도 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: hp-exporter-config
  namespace: hp-workers
data:
  MONGO_HOST: "mongodb.mongodb.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "hp_ops"
  MONGO_REPLICA_SET: ""

  MYSQL_HOST: "hp-rds-master.chemcscc2ik6.ap-northeast-2.rds.amazonaws.com"
  MYSQL_PORT: "3306"
  MYSQL_DB: "homeplate"

  AWS_REGION: "ap-northeast-2"
  S3_BUCKET: "hp-thumbnails"

  KAFKA_BOOTSTRAP_SERVERS: "ticketing-kafka-bootstrap.kafka.svc.cluster.local:9093"
  KAFKA_TOPIC_CRAWL_RESULT: "hp.crawl.result"
  KAFKA_TOPIC_CRAWL_EXPORTED: "hp.crawl.exported"
  KAFKA_SECURITY_PROTOCOL: "SSL"
  KAFKA_SSL_CA_LOCATION: "/etc/kafka/cluster-ca/ca.crt"
  KAFKA_SSL_CERT_LOCATION: "/etc/kafka/user-tls/user.crt"
  KAFKA_SSL_KEY_LOCATION: "/etc/kafka/user-tls/user.key"
