# Deployment: 항상 replicas개의 파드를 유지한다
# 파드가 죽으면 자동으로 재시작한다
# 워커가 Polling 방식(방법 2)이므로 항상 실행 중이어야 한다
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hp-worker
  namespace: hp-workers
  labels:
    app: hp-worker
spec:
  # 워커 2개가 동시에 잡을 나눠서 처리한다
  # acquire_job의 원자적 연산 덕분에 중복 처리가 발생하지 않는다
  replicas: 2
  selector:
    matchLabels:
      app: hp-worker
  template:
    metadata:
      labels:
        app: hp-worker
    spec:
      # SIGTERM 수신 후 이 시간(초) 안에 종료해야 한다
      # handle_signal이 graceful shutdown을 처리하므로 충분한 시간을 준다
      terminationGracePeriodSeconds: 60
      nodeSelector:
        nodepool: app
      volumes:
        # Strimzi 클러스터 CA: 브로커 TLS 인증서 검증용 (kafka ns에서 동기화)
        - name: cluster-ca
          secret:
            secretName: ticketing-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
        # KafkaUser hp-worker TLS 인증서 (kafka ns에서 동기화)
        - name: user-tls
          secret:
            secretName: hp-worker
            items:
              - key: user.crt
                path: user.crt
              - key: user.key
                path: user.key
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hp-worker
          image: "681224237958.dkr.ecr.ap-northeast-2.amazonaws.com/hp-ingestion:v0.1.3"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["python", "-m", "app.worker"]
          # Secret과 ConfigMap의 모든 키를 환경변수로 주입한다
          envFrom:
            - secretRef:
                name: hp-app-secret
            - configMapRef:
                name: hp-config
          volumeMounts:
            - name: cluster-ca
              mountPath: /etc/kafka/cluster-ca
              readOnly: true
            - name: user-tls
              mountPath: /etc/kafka/user-tls
              readOnly: true
          resources:
            requests:
              cpu: "100m" # 0.1 코어 보장
              memory: "128Mi"
            limits:
              cpu: "500m" # 최대 0.5 코어
              memory: "512Mi"
          livenessProbe:
            # MongoDB 연결 모듈을 import할 수 있으면 살아있는 것으로 판단한다
            exec:
              command: ["python", "-c", "import app.mongo_client"]
            initialDelaySeconds: 10 # 컨테이너 시작 후 10초 후에 첫 체크
            periodSeconds: 30 # 30초마다 체크
            failureThreshold: 3 # 3번 연속 실패하면 재시작

