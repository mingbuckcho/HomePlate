# Slack Notifier: hp.crawl.exported consume → Slack 알림 전송
# 가격변동 이벤트를 받아 구단별 굿즈 가격변동을 Slack에 알린다
# SLACK_WEBHOOK_URL이 없으면 로그만 출력하고 정상 동작한다 (개발 환경 배려)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hp-slack
  namespace: hp-workers
  labels:
    app: hp-slack
spec:
  # key=str(product_id)로 파티션이 고정되므로 replicas를 늘려도 순서가 보장된다
  # 최대 partition 수(3개)까지 scale-out 가능
  replicas: 1
  selector:
    matchLabels:
      app: hp-slack
  template:
    metadata:
      labels:
        app: hp-slack
    spec:
      terminationGracePeriodSeconds: 30
      nodeSelector:
        nodepool: app
      volumes:
        - name: cluster-ca
          secret:
            secretName: ticketing-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
        - name: user-tls
          secret:
            secretName: hp-slack
            items:
              - key: user.crt
                path: user.crt
              - key: user.key
                path: user.key
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hp-slack
          image: "681224237958.dkr.ecr.ap-northeast-2.amazonaws.com/hp-ingestion:v0.1.3"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["python", "-m", "app.slack_notifier"]
          envFrom:
            - configMapRef:
                name: hp-config
            - secretRef:
                name: hp-app-secret
          volumeMounts:
            - name: cluster-ca
              mountPath: /etc/kafka/cluster-ca
              readOnly: true
            - name: user-tls
              mountPath: /etc/kafka/user-tls
              readOnly: true
          livenessProbe:
            exec:
              command: ["python", "-c", "import app.kafka_client"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
