# 10분마다 스탈 잡(30분 이상 RUNNING 상태)을 복구한다
# 워커가 죽으면 최대 40분(30분 락 만료 + 10분 Reaper 주기) 이내에 복구된다
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hp-reaper
  namespace: hp-workers
  labels:
    app: hp-reaper
spec:
  schedule: "*/10 * * * *" # 10분마다
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            nodepool: app
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: hp-reaper
              image: "681224237958.dkr.ecr.ap-northeast-2.amazonaws.com/hp-ingestion:v0.1.3"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              command: ["python", "-m", "app.reaper"]
              envFrom:
                - secretRef:
                    name: hp-app-secret
                - configMapRef:
                    name: hp-config
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
          restartPolicy: OnFailure
