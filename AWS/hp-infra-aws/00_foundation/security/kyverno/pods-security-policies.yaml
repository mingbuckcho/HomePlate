# ============================================================
# Kyverno Pod 보안 정책 모음
# ============================================================

---
# 1. Disallow Privileged Containers – 특권 컨테이너 실행 차단
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      특권(privileged) 컨테이너는 호스트의 모든 디바이스에 접근할 수 있어
      보안상 매우 위험합니다. 이 정책은 privileged 모드로 실행되는
      컨테이너를 차단합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - storage
      validate:
        message: "특권(privileged) 컨테이너는 허용되지 않습니다."
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            containers:
              - =(securityContext):
                  =(privileged): "false"
            =(ephemeralContainers):
              - =(securityContext):
                  =(privileged): "false"

---
# 2. Disallow Root User – root(UID 0) 실행 차단
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      컨테이너를 root(UID 0)로 실행하면 컨테이너 탈출 시 호스트에
      큰 피해를 줄 수 있습니다. 이 정책은 root 사용자로 실행되는
      컨테이너를 차단합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-runasnonroot
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
                - cert-manager
                - istio-system
                - storage
                - velero
                - observability
                - cicd
                - kafka
                - mongodb
                - mongodb-test
                - search
      validate:
        message: "컨테이너는 root(UID 0)로 실행될 수 없습니다. runAsNonRoot: true 또는 runAsUser > 0 을 설정하세요."
        anyPattern:
          # Pod 레벨에서 설정된 경우
          - spec:
              securityContext:
                runAsNonRoot: true
          # Pod 레벨에서 runAsUser로 설정된 경우
          - spec:
              securityContext:
                runAsUser: ">0"
          # 컨테이너 레벨에서 설정된 경우
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsUser: ">0"

---
# 3. Require Non-Root Groups – 비루트 그룹 강제
# [Audit] 기존 워크로드 영향 파악 후 Enforce로 전환 예정
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-groups
  annotations:
    policies.kyverno.io/title: Require Non-Root Groups
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      컨테이너 프로세스가 root 그룹(GID 0)으로 실행되면 파일 시스템
      접근 권한이 과도하게 부여될 수 있습니다. 이 정책은 runAsGroup,
      fsGroup, supplementalGroups에 GID 0 사용을 차단합니다.
      단, Istio가 자동 주입하는 istio-init initContainer는 예외 처리합니다.
      현재 Audit 모드로 운영 중 - 위반 현황 파악 후 Enforce 전환 예정.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    # Rule 1. Pod 레벨 securityContext 검사 (fsGroup, supplementalGroups 등)
    - name: check-pod-level-groups
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "root 그룹(GID 0)은 허용되지 않습니다. runAsGroup, fsGroup, supplementalGroups에 0이 아닌 값을 사용하세요."
        pattern:
          spec:
            =(securityContext):
              =(runAsGroup): ">0"
              =(fsGroup): ">0"
              =(supplementalGroups): ">0"

    # Rule 2. initContainers 검사 – istio-init은 예외 처리
    - name: check-initcontainer-groups
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "root 그룹(GID 0)은 허용되지 않습니다. initContainer의 runAsGroup에 0이 아닌 값을 사용하세요."
        foreach:
          - list: "request.object.spec.initContainers"
            preconditions:
              all:
                - key: "{{ element.name }}"
                  operator: NotEquals
                  value: "istio-init"   # istio-init만 정책 적용 제외
            pattern:
              =(securityContext):
                =(runAsGroup): ">0"

    # Rule 3. containers 검사
    - name: check-container-groups
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "root 그룹(GID 0)은 허용되지 않습니다. container의 runAsGroup에 0이 아닌 값을 사용하세요."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              =(securityContext):
                =(runAsGroup): ">0"

    # Rule 4. ephemeralContainers 검사
    - name: check-ephemeralcontainer-groups
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "root 그룹(GID 0)은 허용되지 않습니다. ephemeralContainer의 runAsGroup에 0이 아닌 값을 사용하세요."
        foreach:
          - list: "request.object.spec.ephemeralContainers"
            pattern:
              =(securityContext):
                =(runAsGroup): ">0"
---
# 4. Disallow Privilege Escalation – 권한 상승 차단
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      권한 상승(Privilege Escalation)은 컨테이너 프로세스가 부모 프로세스보다
      더 많은 권한을 획득하는 것을 허용합니다. 이 정책은
      allowPrivilegeEscalation: false 를 강제합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "권한 상승(Privilege Escalation)은 허용되지 않습니다. allowPrivilegeEscalation: false 를 설정하세요."
        pattern:
          spec:
            =(initContainers):
              - securityContext:
                  allowPrivilegeEscalation: "false"
            containers:
              - securityContext:
                  allowPrivilegeEscalation: "false"
            =(ephemeralContainers):
              - securityContext:
                  allowPrivilegeEscalation: "false"

---
# 5. Drop All Capabilities – 모든 Linux Capabilities 제거
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: drop-all-capabilities
  annotations:
    policies.kyverno.io/title: Drop All Capabilities
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Linux capabilities는 프로세스에 특정 커널 권한을 부여합니다.
      이 정책은 모든 capabilities를 제거(drop: ALL)하도록 강제하며,
      허용된 capabilities만 명시적으로 추가(add)할 수 있습니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Rule 1. drop: ALL 강제
    - name: check-drop-all
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - cicd
                - storage
      validate:
        message: "모든 Linux capabilities를 제거해야 합니다. securityContext.capabilities.drop에 'ALL'을 설정하세요."
        pattern:
          spec:
            =(initContainers):
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
            =(ephemeralContainers):
              - securityContext:
                  capabilities:
                    drop:
                      - ALL

    # Rule 2. add 가능한 capability 화이트리스트
    - name: check-allowed-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
                - istio-system
                - storage
                - observability
                - cicd
      validate:
        message: >-
          허용되지 않은 capability입니다.
          add 가능한 목록: NET_BIND_SERVICE, NET_ADMIN, SYS_PTRACE, DAC_READ_SEARCH
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.containers[].securityContext.capabilities.add[] }}"
                operator: AnyNotIn
                value:
                  - NET_BIND_SERVICE   # 1024 이하 포트 바인딩 (웹서버 등)
                  - NET_ADMIN          # 네트워크 설정 (Cilium)
                  - SYS_PTRACE         # 프로세스 추적 (APM 에이전트)
                  - DAC_READ_SEARCH    # 파일 권한 우회 읽기 (로깅 에이전트)

---
# 6. Disallow hostPath – 호스트 파일시스템 마운트 차단
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-path
  annotations:
    policies.kyverno.io/title: Disallow hostPath
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      hostPath 볼륨은 컨테이너에서 호스트 노드의 파일시스템에
      직접 접근할 수 있게 합니다. 이는 민감한 데이터 노출 및
      컨테이너 탈출 위험이 있어 차단합니다.
      단, 시스템 에이전트가 배포되는 네임스페이스는 예외로 허용합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-hostpath
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
                - istio-system
                - storage
                - velero
                - observability
                - cicd
      validate:
        message: "hostPath 볼륨은 허용되지 않습니다. PersistentVolumeClaim 또는 emptyDir을 사용하세요."
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "null"

---
# 7. Disallow hostNetwork / hostPID / hostIPC – 호스트 네임스페이스 공유 차단
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      hostNetwork, hostPID, hostIPC를 사용하면 컨테이너가 호스트의
      네트워크, 프로세스, IPC 네임스페이스를 공유하게 됩니다.
      이는 호스트 시스템 노출 위험이 크므로 차단합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-host-network
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
                - istio-system
      validate:
        message: "hostNetwork 사용은 허용되지 않습니다."
        pattern:
          spec:
            =(hostNetwork): "false"

    - name: check-host-pid
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
      validate:
        message: "hostPID 사용은 허용되지 않습니다."
        pattern:
          spec:
            =(hostPID): "false"

    - name: check-host-ipc
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kyverno
      validate:
        message: "hostIPC 사용은 허용되지 않습니다."
        pattern:
          spec:
            =(hostIPC): "false"
