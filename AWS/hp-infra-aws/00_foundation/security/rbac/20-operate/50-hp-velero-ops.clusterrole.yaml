apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hp-velero-ops
rules:
  - apiGroups: ["velero.io"]
    resources:
      - backups
      - restores
      - schedules
      - deletebackuprequests
      - backupstoragelocations
      - volumesnapshotlocations
      - downloadrequests
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["batch"]
    resources: ["jobs","cronjobs"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: [""]
    resources: ["pods","pods/log","services","configmaps","secrets","serviceaccounts","events"]
    verbs: ["get","list","watch","create","update","patch","delete"]
