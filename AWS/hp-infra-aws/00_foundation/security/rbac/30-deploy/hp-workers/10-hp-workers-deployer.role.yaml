apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hp-workers-deployer
  namespace: hp-workers
  labels:
    homeplate.io/tier: deploy
    homeplate.io/namespace: hp-workers
rules:
  # Workloads
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch","create","update","patch"]

  # Jobs/CronJobs (크롤러/배치 운영)
  - apiGroups: ["batch"]
    resources: ["jobs","cronjobs"]
    verbs: ["get","list","watch","create","update","patch"]

  # Pod read & logs
  - apiGroups: [""]
    resources: ["pods","pods/log"]
    verbs: ["get","list","watch"]

  # Service / Config
  - apiGroups: [""]
    resources: ["services","configmaps"]
    verbs: ["get","list","watch","create","update","patch"]

  # Secrets / SA
  - apiGroups: [""]
    resources: ["secrets","serviceaccounts"]
    verbs: ["get","list","watch","create","update","patch"]
