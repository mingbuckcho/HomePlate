apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-kafkauser-secrets-cronjob
  namespace: keda
spec:
  schedule: "*/1 * * * *"   # 5분마다(회전 대응)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata: 
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: secret-sync-sa
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: sync
            image: 681224237958.dkr.ecr.ap-northeast-2.amazonaws.com/kubectl-openssl:v0.1.9
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            command: ["/bin/sh","-lc"]
            args:
              - |
                set -euo pipefail

                SRC_NS="kafka"
                SRC_SECRET="ticketing-notification-keda"
                SRC_CLUSTER_CA_SECRET="ticketing-cluster-ca-cert"
                DST_NS="keda"
                DST_SECRET="keda-kafka-tls"

                # 원본 Secret에서 PEM 추출 (너 출력대로 키 이름이 ca.crt / user.crt / user.key)
                kubectl -n "$SRC_NS" get secret "$SRC_CLUSTER_CA_SECRET" -o jsonpath='{.data.ca\.crt}'   | base64 -d > /tmp/ca.crt
                kubectl -n "$SRC_NS" get secret "$SRC_SECRET" -o jsonpath='{.data.user\.crt}' | base64 -d > /tmp/user.crt
                kubectl -n "$SRC_NS" get secret "$SRC_SECRET" -o jsonpath='{.data.user\.key}' | base64 -d > /tmp/user.key

                # PKCS8 -> PKCS1 (RSA PRIVATE KEY)
                openssl pkey -in /tmp/user.key -traditional -out /tmp/user-rsa.key

                # 변환 결과가 진짜 PKCS1인지 확인
                head -n 1 /tmp/user-rsa.key | grep -q "BEGIN RSA PRIVATE KEY" || {
                  echo "ERROR: Converted key is not 'BEGIN RSA PRIVATE KEY'."
                  echo "       (If key is EC, PKCS1 conversion is not applicable.)"
                  exit 1
                }

                # KEDA가 참조할 Secret 생성/갱신
                kubectl -n "$DST_NS" create secret generic "$DST_SECRET" \
                  --from-file=ca.crt=/tmp/ca.crt \
                  --from-file=cert=/tmp/user.crt \
                  --from-file=key=/tmp/user-rsa.key \
                  --dry-run=client -o yaml | kubectl apply -f -
