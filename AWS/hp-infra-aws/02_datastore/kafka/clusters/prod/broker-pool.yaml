apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: broker
  namespace: kafka
  labels:
    strimzi.io/cluster: ticketing
spec:
  # prod는 broker 3개
  # replication factor 3을 맞추기 위한 최소 구성
  # 1개 죽어도 나머지 2개에서 서빙 가능
  replicas: 3
  roles:
    - broker
  template:
    kafkaContainer:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # ✅ 여기 아래로 “스케줄링 관련”을 전부 모은다
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "data"
          effect: "NoSchedule"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodepool
                    operator: In
                    values:
                      - app
                      - data
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: ticketing
                    strimzi.io/name: ticketing-kafka
                topologyKey: kubernetes.io/hostname

  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 30Gi
        class: gp3
        deleteClaim: false
  resources:
    requests:
      memory: 2Gi
      cpu: "500m"
    limits:
      memory: 4Gi
      cpu: "1"
  jvmOptions:
    # Heap = limits memory의 절반
    # 나머지 절반은 OS 페이지 캐시 → Kafka 성능에 직접 영향
    -Xms: "2048m"
    -Xmx: "2048m"
