  namespace: cicd
  labels:
    app: sonarqube
    release: kps 
spec:
  selector:
    matchLabels:
      app: sonarqube
  endpoints:
    - port: http
      path: /api/prometheus/metrics
      params:
        passcode: ["pass123#"]