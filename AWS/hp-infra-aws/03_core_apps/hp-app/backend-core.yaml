---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: hp-backend-core
  namespace: hp-core
  labels:
    app: hp-backend-core
spec:
  selector:
    matchLabels:
      app: hp-backend-core
  strategy:
    canary:
      canaryService: hp-backend-core-canary
      stableService: hp-backend-core-stable
      trafficRouting:
        istio:
          virtualService:
            name: hp-integrated-vs
            routes:
            - core-api 
      steps:
      - setWeight: 100
#  - analysis:
#      templates:
#      - templateName: hp-canary-analysis
#      args:
#      - name: service-name
#        value: hp-backend-core
#      - setWeight: 50
#      - pause: {duration: 5m}
#      - setWeight: 100
  template:
    metadata:
      labels:
        app: hp-backend-core
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      nodeSelector:
        nodepool: app
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hp-backend-core # 👈 [수정 완료]
              topologyKey: "kubernetes.io/hostname"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
      - name: hp-backend-core
        # CI/CD 파이프라인에서 빌드 시점의 ECR 주소와 태그로 치환(sed 또는 kustomize)되어야 합니다.
        image: 681224237958.dkr.ecr.ap-northeast-2.amazonaws.com/hp-backend:v0.1.80
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: hp-backend-secret
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_SERVICE_NAME
          value: "hp-backend-core"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://alloy-collector.observability.svc.cluster.local:4318"
        - name: OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED
          value: "true"
        - name: OTEL_INSTRUMENTATION_COMMON_LOGGING_TRACE_ID
          value: "true"
        - name: OTEL_INSTRUMENTATION_COMMON_LOGGING_SPAN_ID
          value: "true"
        - name: OTEL_INSTRUMENTATION_COMMON_LOGGING_TRACE_FLAGS
          value: "true"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: APP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hp-backend-secret
              key: ADMIN_PASSWORD

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 150
          periodSeconds: 10
          timeoutSeconds: 5        # 👈 [꼭 추가]
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 150
          periodSeconds: 10
          timeoutSeconds: 5        # 👈 [꼭 추가]
          failureThreshold: 5

---
# 🚨 [수정 완료] 기존 hp-backend-core를 stable로 변경
apiVersion: v1
kind: Service
metadata:
  name: hp-backend-core-stable
  namespace: hp-core
  labels:
    app: hp-backend-core
spec:
  type: ClusterIP
  selector:
    app: hp-backend-core
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080

---
# 🚨 [수정 완료] canary 서비스 새로 추가
apiVersion: v1
kind: Service
metadata:
  name: hp-backend-core-canary
  namespace: hp-core
  labels:
    app: hp-backend-core
spec:
  type: ClusterIP
  selector:
    app: hp-backend-core
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080